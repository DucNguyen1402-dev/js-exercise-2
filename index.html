<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JS Exercises Collection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./src/icon/js.png" />

    <link rel="stylesheet" href="./dist/output.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script type="module" src="./src/js/main.js"></script>
    <script type="module" src="./src/js/exercise1.js"></script>
    <!-- <script type="module" src="./src/js/exercise2.js"></script>
    <script type="module" src="./src/js/exercise3.js"></script>
    <script type="module" src="./src/js/exercise4.js"></script> -->
  </head>

  <body
    class="relative min-h-screen overflow-hidden bg-linear-to-br from-slate-900 via-slate-800 to-slate-700 py-10"
  >
    <div class="flex justify-center gap-2">
      <div class="w-10 overflow-hidden">
        <img src="./src/img/exam.png" alt="exam icon" class="object-contain" />
      </div>

      <h1 class="mb-16 text-center text-4xl font-bold tracking-wide text-white">
        My JS Exercises
      </h1>
    </div>
    <main
      class="card-container mx-auto grid max-w-4xl grid-cols-2 place-items-center gap-x-10 gap-y-16"
    >
      <article
        class="card admission__management group relative h-140 max-w-md cursor-pointer overflow-hidden rounded-lg border border-slate-100 bg-gray-100 p-4 pb-6 transition duration-500 hover:-translate-y-4 closed-card "
      >
        <p class=" text-slate-500">
          Enter the benchmark, scores for three subjects, priority area (A, B,
          C, X), and priority category (1, 2, 3, 0).
        </p>
        <div class="mt-6">
          <label class="text-sm font-medium text-gray-400">Benchmark</label>
          <input
            type="number"
            resetCheckArea();
            class="input__benchmark mt-2 w-full rounded-sm border border-gray-300 bg-white px-2 py-1 placeholder:text-gray-400 focus:ring-2 focus:ring-blue-500/60 focus:outline-none"
            placeholder="e.g. 25"
            min="0"
            max="30"
            step="0.1"
          />
        </div>
        <div class="mt-4 grid grid-cols-3 gap-6">
          <div>
            <label class="text-sm font-medium text-gray-400">Math</label>
            <input
              type="number"
              class="subject__input mt-2 w-full rounded-sm border border-gray-300 bg-white px-2 py-1 focus:ring-1 focus:ring-blue-500/60 focus:outline-none"
              min="0"
              max="10"
              step="0.1"
            />
          </div>
          <div>
            <label class="text-sm font-medium text-gray-400">Physics</label>
            <input
              type="number"
              class="subject__input mt-2 w-full rounded-sm border border-gray-300 bg-white px-2 py-1 focus:ring-1 focus:ring-blue-500/60 focus:outline-none"
              min="0"
              max="10"
              step="0.1"
            />
          </div>
          <div>
            <label class="text-sm font-medium text-gray-400">Chemistry</label>
            <input
              type="number"
              class="subject__input mt-2 w-full rounded-sm border border-gray-300 bg-white px-2 py-1 focus:ring-1 focus:ring-blue-500/60 focus:outline-none"
              min="0"
              max="10"
              step="0.1"
            />
          </div>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-gray-400">Area</label>
            <select
              class="select__area cursor-pointer rounded-sm border border-gray-300 bg-white px-2 py-1.5 text-sm text-gray-500 focus:ring-1 focus:ring-blue-500 focus:outline-none"
            >
              <option value="A">None (X)</option>
              <option value="B">Area A</option>
              <option value="C">Area B</option>
              <option class="D">Area C</option>
            </select>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-gray-400">Caterogy</label>
            <select
              class="select__caterory cursor-pointer rounded-sm border border-gray-300 bg-white px-2 py-1.5 text-sm text-gray-500 focus:ring-1 focus:ring-blue-500 focus:outline-none"
            >
              <option value="0">None (0)</option>
              <option value="1">Caterogy 1</option>
              <option value="2">Caterogy 2</option>
              <option class="3">Caterogy 3</option>
            </select>
          </div>
        </div>
        <div class="mt-30 text-sm text-white">
          <div class="benchmark__warning__area hidden rounded-sm p-2"></div>
          <div class="subject__warning__area hidden rounded-sm p-2"></div>
          <div
            class="check__area flex items-center gap-2 rounded-sm p-2 text-white"
          >
            <div class="sad__icon hidden">
              <span class="fa-regular fa-face-frown"></span>
            </div>

            <div class="happy__icon hidden">
              <span class="fa-regular fa-face-smile"></span>
            </div>
            <p class="check__area__text text-base"></p>
          </div>
        </div>

        <button
          type="button"
          class="check__btn absolute bottom-2 left-2 cursor-pointer rounded-md border-none bg-blue-500 px-4 py-2 text-sm text-white transition-colors duration-300 hover:bg-blue-600"
        >
          Check result
        </button>


        <div
          class="backdrop absolute inset-0 z-10 flex items-center justify-center bg-linear-to-br from-indigo-600 to-purple-600 text-slate-200 transition duration-1000 group-hover:from-indigo-700 group-hover:to-purple-700 group-hover:text-slate-100"
        >
          <h2 class="text-xl font-bold tracking-wider">
            01. ADMISSION MANAGEMENT
          </h2>
        </div>
      </article>





    </main>
    <div id="backdrop" class="fixed inset-0 bg-slate-900/90 hidden z-40"></div>
    <div
      class="round-shape fixed w-12 top-5 right-3 animate-bounce transition duration-2000 ease-out"
    >
      <img src="./src/img/round-shape.png" alt="round shape icon" />
    </div>

    <div class="flex flex-col gap-2 absolute top-2 right-2">
      <span
        class="card-guide is-open text-sm bg-blue-600 pl-6 pr-4 py-3 rounded-l-full text-white translate-x-[110%] transition-transform duration-1000 ease-out cursor-pointer"
        >Click a card to open it</span
      >
      <span
        class="card-guide is-collapsed text-sm bg-rose-600 pl-6 py-3 rounded-l-full text-white translate-x-[110%] transition-transform duration-1000 ease-out cursor-pointer "
        >Press ESC to close it</span
      >
    </div> 
  </body>
</html>
